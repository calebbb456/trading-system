<!DOCTYPE html>
<html>
<head><title>Trading Mode Switch</title></head>
<body style="font-family:sans-serif;text-align:center;padding:50px;">
  <h1>Current Mode: <span id="mode" style="font-size:48px;">LOADING</span></h1>
  <button onclick="setMode('paper')" style="font-size:24px;padding:20px;background:#3498db;color:white;border:none;margin:10px;">SWITCH TO PAPER</button>
  <button onclick="setMode('live')" style="font-size:24px;padding:20px;background:#e74c3c;color:white;border:none;margin:10px;">SWITCH TO LIVE</button>
  <script>
    const SERVER = "https://YOUR-RENDER-URL.onrender.com";
    function refreshStatus() {
      fetch(SERVER + "/status").then(r => r.json()).then(d => {
        document.getElementById("mode").innerText = d.mode.toUpperCase();
        document.getElementById("mode").style.color = d.mode === "live" ? "red" : "green";
      });
    }
    function setMode(m) {
      const password = prompt("Enter password:");
      let confirm_phrase = "";
      if (m === "live") {
        confirm_phrase = prompt("Type exactly: I CONFIRM LIVE TRADING");
      }
      fetch(SERVER + "/set-mode", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password: password, mode: m, confirm_phrase: confirm_phrase})
      }).then(r => r.json()).then(d => { alert(JSON.stringify(d)); refreshStatus(); });
    }
    refreshStatus();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
